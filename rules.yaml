# Thresholds and weights for drift detection and triage.
# Edit values here; no code changes needed.

stale_days: 7            # no ATS movement for this many days => stale
limbo_days: 3            # days after passing a stage with no future step => limbo
# rapidfuzz WRatio score (0-100) to flag near-duplicate names.
# 85 catches nickname pairs: WRatio("Jon Smith", "Jonathan Smith") = 85.5.
# The data generator filters sampled names at this same threshold, so clean
# records can never collide with it.
duplicate_threshold: 85

roles_in_scope:
  - FDE
  - Growth Strategist
  - Customer Success Lead
  - Growth Strategy Lead

# Severity assigned per discrepancy type when triage runs offline (--no-llm),
# and used as a prior hint for the investigation agent.
severity_weights:
  ghost_in_ats: urgent
  ghost_in_tracking: urgent
  stage_mismatch: attention
  stale: attention
  scheduling_limbo: attention
  owner_gap: lag
  duplicate_suspect: lag

slack:
  # Approved drafts post to the role's channel; {role} is lowercased and
  # dash-slugged (FDE -> #hiring-fde). Fallback when no role applies:
  channel_template: "#hiring-{role}"
  default_channel: "#hiring-ops"

llm:
  # gpt-5.4-mini: small tool surface (4 tools), shallow investigations
  # (<= 8 calls), classification-grade judgment behind a human gate.
  # Upshift to gpt-5.5 if review quality demands it (openai_docs pricing:
  # 6.7x input cost over mini's tier sibling gpt-5.4, 40x over mini).
  model: gpt-5.4-mini
  max_tool_calls: 8      # hard cap per discrepancy, enforced in our tool wrapper
  recursion_limit: 20    # framework-level backstop for the agent graph
